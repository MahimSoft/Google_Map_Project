 {% load static %}
        
        {% if request.user.is_authenticated %}
        <li><a href="{% url 'account_logout' %}"><img src="{% static 'images/logout-2.svg' %}" class="h-4" alt="logout"></a></li>
        {% else %}
        <li><a href="{% url 'account_login' %}"><img src="{% static 'images/login-2.svg' %}" class="h-4" alt="login"></a></li>
        {% endif %}
